# nginx edge de OrangeFactory.
# Corre como servicio dentro de docker-compose.prod.yml y es el unico puerto publico (80/443).
# Termina TLS con certificados Let's Encrypt y enruta hacia backend y frontend por la red interna de Docker.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # -----------------------------------------------------------------------
    # HTTP :80
    #   - Sirve el webroot de certbot para renovaciones.
    #   - Redirige todo lo demas a HTTPS.
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name orangefactory.cl www.orangefactory.cl;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS :443
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name orangefactory.cl www.orangefactory.cl;

        ssl_certificate     /etc/nginx/certs/live/orangefactory.cl/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/orangefactory.cl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # /api/* -> backend FastAPI (strip del prefijo /api)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Todo lo demas -> frontend (nginx interno del container con el build estatico)
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
