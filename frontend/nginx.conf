# nginx interno del contenedor del frontend.
# Sirve el SPA con fallback a index.html. El reverse proxy externo (el otro nginx) se encarga del TLS y el ruteo de /api.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache largo para assets con hash (Vite los genera con fingerprint).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
