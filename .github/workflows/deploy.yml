name: Deploy OrangeFactory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Pull + rebuild + migrate on server
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            set -euo pipefail
            cd /opt/orangefactory
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
          EOF

      - name: Smoke test
        run: |
          sleep 5
          curl -fsS https://orangefactory.cl/api/health || (echo "Health check failed" && exit 1)
